kind = "web"
previewPath = "/"
title = "网页抓取练习工具"
version = "1.0.0"
id = "artifacts/scraper-tool"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25879

[services.development]
run = "pnpm --filter @workspace/scraper-tool run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scraper-tool", "run", "build" ]
publicDir = "artifacts/scraper-tool/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25879"
BASE_PATH = "/"
