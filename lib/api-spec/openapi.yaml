openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: scraper
    description: Web scraping operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /scrape:
    post:
      operationId: startScrape
      tags: [scraper]
      summary: Start a scraping job
      description: Launches a headless browser to scrape the given URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScrapeRequest"
      responses:
        "200":
          description: Scraping completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapeResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Scraping failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /scrape/history:
    get:
      operationId: getScrapeHistory
      tags: [scraper]
      summary: Get scrape history
      description: Returns a list of recent scraping jobs
      responses:
        "200":
          description: List of scrape results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScrapeHistoryItem"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ScrapeRequest:
      type: object
      properties:
        url:
          type: string
          description: URL to scrape
        options:
          $ref: "#/components/schemas/ScrapeOptions"
      required:
        - url
        - options
    ScrapeOptions:
      type: object
      properties:
        headings:
          type: boolean
        links:
          type: boolean
        paragraphs:
          type: boolean
        images:
          type: boolean
        metaTags:
          type: boolean
        customSelectors:
          type: array
          items:
            $ref: "#/components/schemas/CustomSelector"
        clickSelector:
          type: string
          description: CSS selector of element to click before extracting
        clickWaitMs:
          type: number
          description: Milliseconds to wait after clicking
        waitForPopupClose:
          type: boolean
          description: Wait for a popup/background window to open and close before scraping
        popupTimeoutMs:
          type: number
          description: Max milliseconds to wait for popup to close
        steps:
          type: array
          description: Ordered sequence of actions to perform before scraping
          items:
            $ref: "#/components/schemas/ScrapeStep"
      required:
        - headings
        - links
        - paragraphs
        - images
        - metaTags
    ScrapeStep:
      type: object
      properties:
        type:
          type: string
          enum: [click, listen, type, key, select, scroll, hover]
          description: >
            click: click element;
            listen: wait for element/network condition;
            type: type text into input;
            key: press a keyboard key;
            select: choose dropdown option;
            scroll: scroll to element;
            hover: hover over element
        selector:
          type: string
          description: CSS selector (click, listen, type, select, scroll, hover)
        waitMs:
          type: number
          description: Additional ms to wait after this step completes
        waitForPopupClose:
          type: boolean
          description: (click) Wait for a popup to open and close
        popupTimeoutMs:
          type: number
          description: (click) Max ms to wait for popup close
        listenFor:
          type: string
          enum: [appear, disappear, networkIdle]
          description: (listen) Condition to wait for
        listenTimeout:
          type: number
          description: (listen) Max ms before giving up
        text:
          type: string
          description: (type) Text to type into the input
        key:
          type: string
          description: (key) Key to press, e.g. Enter, Tab, Escape, ArrowDown
        value:
          type: string
          description: (select) Option value or label to select
      required:
        - type
    CustomSelector:
      type: object
      properties:
        name:
          type: string
          description: Label for this extraction
        selector:
          type: string
          description: CSS selector to extract text from
      required:
        - name
        - selector
    ScrapeResult:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
        title:
          type: string
        scrapedAt:
          type: string
        duration:
          type: number
          description: Time taken in milliseconds
        headings:
          type: array
          items:
            $ref: "#/components/schemas/Heading"
        links:
          type: array
          items:
            $ref: "#/components/schemas/Link"
        paragraphs:
          type: array
          items:
            type: string
        images:
          type: array
          items:
            $ref: "#/components/schemas/Image"
        metaTags:
          type: array
          items:
            $ref: "#/components/schemas/MetaTag"
        customResults:
          type: array
          items:
            $ref: "#/components/schemas/CustomResult"
        clickedElement:
          type: string
          description: CSS selector that was clicked, if any
      required:
        - id
        - url
        - title
        - scrapedAt
        - duration
        - headings
        - links
        - paragraphs
        - images
        - metaTags
    Heading:
      type: object
      properties:
        level:
          type: string
        text:
          type: string
      required:
        - level
        - text
    Link:
      type: object
      properties:
        text:
          type: string
        href:
          type: string
      required:
        - text
        - href
    Image:
      type: object
      properties:
        src:
          type: string
        alt:
          type: string
      required:
        - src
        - alt
    MetaTag:
      type: object
      properties:
        name:
          type: string
        content:
          type: string
      required:
        - name
        - content
    ScrapeHistoryItem:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
        title:
          type: string
        scrapedAt:
          type: string
        duration:
          type: number
        itemCount:
          type: number
      required:
        - id
        - url
        - title
        - scrapedAt
        - duration
        - itemCount
    CustomResult:
      type: object
      properties:
        name:
          type: string
        selector:
          type: string
        values:
          type: array
          items:
            type: string
      required:
        - name
        - selector
        - values
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
